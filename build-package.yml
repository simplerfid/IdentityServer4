# Build IdentityServer4 (simplerfid fork) and publish the NuGet packages to Azure Artifacts.
# Cross-platform .NET SDK build via build.sh; push uses the .NET CLI (no mono dependency,
# so it works on ubuntu-latest / Ubuntu 24.04+).

trigger:
- main

pool:
  vmImage: 'ubuntu-latest'

steps:
- task: Bash@3
  displayName: 'Build & pack (build.sh)'
  inputs:
    filePath: './build.sh'

- task: DotNetCoreCLI@2
  displayName: 'Push NuGet packages to Azure Artifacts'
  inputs:
    command: 'push'
    packagesToPush: './nuget/*.nupkg'
    nuGetFeedType: 'internal'
    publishVstsFeed: 'ab692db8-8cb7-40df-bce4-34705ed4b329'